name: Secret scanning

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  trufflehog-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run TruffleHog secret scan
        uses: trufflesecurity/trufflehog-action@v2
        with:
          # Scan the entire repo for high-entropy strings and common secrets
          args: --entropy=False --json
